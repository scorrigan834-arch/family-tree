<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Build Your Credit &mdash; Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="site.js" defer></script>
<style>
  .stage{max-width:520px;margin:0 auto;}
  .gauge{text-align:center;}
  .score{font-family:var(--serif);font-size:clamp(48px,12vw,72px);line-height:1;transition:color .4s;}
  .rating{font-weight:700;font-size:16px;letter-spacing:.02em;margin-top:2px;transition:color .4s;}
  .track{position:relative;height:14px;border-radius:99px;margin:20px 6px 4px;background:linear-gradient(90deg,#C0553B,#E8A24A 38%,#8FB75B 66%,#2F7D53);}
  .marker{position:absolute;top:-6px;width:6px;height:26px;border-radius:3px;background:#12332A;box-shadow:0 1px 5px rgba(0,0,0,.35);transform:translateX(-50%);transition:left .7s cubic-bezier(.2,.8,.2,1);}
  .ends{display:flex;justify-content:space-between;font-size:11px;color:var(--stone);margin:0 6px;}
  .prog{text-align:center;font-size:13px;color:var(--stone);font-weight:600;margin:22px 0 8px;}
  .scene{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 12px 32px rgba(15,42,34,.08);}
  .scene h2{font-family:var(--serif);color:var(--forest);font-size:20px;margin:0 0 6px;}
  .scene p.q{font-size:15px;color:var(--ink);line-height:1.5;margin:0 0 14px;}
  .choice{display:block;width:100%;text-align:left;padding:14px 16px;margin:9px 0;border:1px solid var(--line);border-radius:12px;background:var(--paper);font-family:var(--sans);font-size:15px;color:var(--ink);cursor:pointer;transition:transform .12s,border-color .12s,background .12s;}
  .choice:hover:not(:disabled){border-color:var(--moss);transform:translateY(-2px);}
  .choice:disabled{cursor:default;}
  .choice.pick-good{border-color:var(--moss);background:#EAF1E3;font-weight:600;}
  .choice.pick-bad{border-color:var(--clay);background:#F8ECE4;font-weight:600;}
  .fb{margin-top:12px;font-size:14px;border-radius:10px;padding:11px 14px;display:none;}
  .fb.show{display:block;}
  .fb .delta{font-weight:700;}
  .nextwrap{margin-top:14px;text-align:right;}
</style>
</head>
<body>
<header class="topbar"><div class="bar"><a class="brand" href="index.html" style="text-decoration:none;"><svg width="24" height="24" viewBox="0 0 48 48" fill="none" style="color:var(--sprout)"><path d="M24 43C24 35 24 30 24 17" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M24 31C15 32 9.5 25.5 11 18C18.5 19 23 24.5 24 31Z" fill="currentColor"/><path d="M24 24C32.5 25 38.5 18.5 37 11C29.5 12 24.5 17.5 24 24Z" fill="currentColor"/><circle cx="24" cy="14" r="3.1" fill="currentColor"/></svg><span class="wm">Family <i>Tree</i></span></a></div></header>
<section class="section band-forest">
  <div class="inner">
    <span class="eyebrow" style="color:var(--sprout);">Play &middot; Branching Out</span>
    <h1 class="display" style="font-size:clamp(30px,6vw,46px);">Build your credit</h1>
    <p class="subhead">Your credit score follows you into apartments, car loans, even job offers. Make the calls and watch your score move.</p>
  </div>
</section>
<section class="section band-paper">
  <div class="inner">
    <div class="stage">
      <div class="gauge">
        <div class="score" id="score">650</div>
        <div class="rating" id="rating">Fair</div>
        <div class="track"><div class="marker" id="marker"></div></div>
        <div class="ends"><span>300</span><span>850</span></div>
      </div>
      <div class="prog" id="prog"></div>
      <div class="scene" id="scene"></div>
    </div>
    <p style="text-align:center;margin-top:28px;"><a href="branching-credit.html">Read the lesson</a> &middot; <a href="games.html">All games</a></p>
  </div>
</section>
<script>
(function(){
  var score=650, i=0, lock=false;
  var scoreEl=document.getElementById('score'), ratingEl=document.getElementById('rating'),
      marker=document.getElementById('marker'), sceneEl=document.getElementById('scene'), progEl=document.getElementById('prog');
  var STEPS=[
    {t:'Your first credit card bill', q:'Your first bill is $120 and it&rsquo;s due Friday.', c:[
      {t:'Pay it in full, on time', d:25, good:true, n:'On-time, full payments are the single biggest driver of a good score.'},
      {t:'Pay just the minimum', d:-5, good:false, n:'It keeps you current, but interest piles up. Not the habit you want.'},
      {t:'Skip it this month', d:-65, good:false, n:'A missed payment can haunt your score for years. Never skip.'}
    ]},
    {t:'Holiday shopping', q:'Your card limit is $1,000. How much do you put on it?', c:[
      {t:'Keep it under $300', d:22, good:true, n:'Using less than about 30% of your limit shows lenders you&rsquo;re in control.'},
      {t:'Spend around $900', d:-20, good:false, n:'Using almost your whole limit makes lenders nervous.'},
      {t:'Max it out', d:-35, good:false, n:'A maxed-out card is a big red flag to lenders.'}
    ]},
    {t:'A tempting offer', q:'A store offers 15% off today if you open their credit card.', c:[
      {t:'Politely decline', d:6, good:true, n:'Skipping impulse credit keeps your history clean and steady.'},
      {t:'Open it for the discount', d:-15, good:false, n:'A new account plus a hard credit check ding your score a bit.'}
    ]},
    {t:'Monthly bills', q:'You&rsquo;ve got phone and streaming bills every month.', c:[
      {t:'Set up autopay', d:20, good:true, n:'Never missing a due date is the easiest win in all of credit.'},
      {t:'Pay them when you remember', d:-15, good:false, n:'One forgotten bill can cost you a surprising number of points.'}
    ]},
    {t:'An old card', q:'You have a card from two years ago you rarely use.', c:[
      {t:'Keep it open', d:15, good:true, n:'A longer history and that unused limit both help your score.'},
      {t:'Close it', d:-15, good:false, n:'Closing it shortens your history and raises your usage ratio.'}
    ]},
    {t:'Shopping for a car loan', q:'You want to finance a used car.', c:[
      {t:'Check your score, then compare lenders within a week', d:15, good:true, n:'Rate-shopping in a short window usually counts as just one inquiry.'},
      {t:'Apply at six places over two months', d:-22, good:false, n:'Lots of separate hard inquiries pull your score down.'}
    ]},
    {t:'Oops', q:'You realize a payment slipped through the cracks last week.', c:[
      {t:'Pay it now and set reminders', d:10, good:true, n:'Catching it fast and rebuilding your streak helps you bounce back.'},
      {t:'Deal with it some other time', d:-45, good:false, n:'The longer a payment stays late, the more it hurts.'}
    ]}
  ];
  function band(s){
    if(s<580) return {label:'Poor', color:'#C0553B'};
    if(s<670) return {label:'Fair', color:'#C96F3F'};
    if(s<740) return {label:'Good', color:'#6E9E3E'};
    if(s<800) return {label:'Very Good', color:'#3B8B63'};
    return {label:'Excellent', color:'#2F7D53'};
  }
  function paint(){
    var b=band(score);
    scoreEl.textContent=Math.round(score); scoreEl.style.color=b.color;
    ratingEl.textContent=b.label; ratingEl.style.color=b.color;
    marker.style.left=Math.max(0,Math.min(100,(score-300)/550*100))+'%';
  }
  function animateScore(from,to){
    var start=null, dur=650;
    function tick(t){ if(!start)start=t; var p=Math.min(1,(t-start)/dur); score=from+(to-from)*p; paint(); if(p<1)requestAnimationFrame(tick); }
    requestAnimationFrame(tick);
  }
  function render(){
    if(i>=STEPS.length) return end();
    lock=false;
    var st=STEPS[i];
    progEl.textContent='Decision '+(i+1)+' of '+STEPS.length;
    var h='<h2>'+st.t+'</h2><p class="q">'+st.q+'</p>';
    st.c.forEach(function(ch,ci){ h+='<button class="choice" data-i="'+ci+'">'+ch.t+'</button>'; });
    h+='<div class="fb" id="fb"></div><div class="nextwrap" id="nw"></div>';
    sceneEl.innerHTML=h;
    Array.prototype.forEach.call(sceneEl.querySelectorAll('.choice'),function(b){ b.onclick=function(){ pick(st,+b.getAttribute('data-i'),b); }; });
  }
  function pick(st,ci,btn){
    if(lock) return; lock=true;
    var ch=st.c[ci], from=score, to=Math.max(300,Math.min(850,score+ch.d));
    animateScore(from,to);
    Array.prototype.forEach.call(sceneEl.querySelectorAll('.choice'),function(b){ b.disabled=true; });
    btn.classList.add(ch.good?'pick-good':'pick-bad');
    var fb=document.getElementById('fb');
    fb.innerHTML='<span class="delta" style="color:'+(ch.d>=0?'#3B8B63':'#C0553B')+'">'+(ch.d>=0?'+':'')+ch.d+' points</span> &mdash; '+ch.n;
    fb.style.background=ch.d>=0?'#EAF1E3':'#F8ECE4'; fb.classList.add('show');
    var nb=document.createElement('button'); nb.className='btn';
    nb.textContent=(i<STEPS.length-1)?'Next \u2192':'See your score \u2192';
    nb.onclick=function(){ i++; render(); };
    document.getElementById('nw').appendChild(nb);
    if(ch.good && ch.d>=20 && window.ftCelebrate) window.ftCelebrate('Smart move!');
  }
  function end(){
    progEl.textContent='Your credit journey';
    var b=band(score);
    var msg = score>=740 ? 'Excellent work &mdash; this score unlocks the best rates on cars, homes, and more.' :
              score>=670 ? 'Solid! A good score like this saves you real money on every loan.' :
              score>=580 ? 'You&rsquo;re on your way. A few more on-time habits and this climbs fast.' :
              'Credit takes time to rebuild &mdash; on-time payments and low balances turn it around.';
    sceneEl.innerHTML='<h2 style="text-align:center;">Final score: <span style="color:'+b.color+'">'+Math.round(score)+'</span></h2>'+
      '<p class="q" style="text-align:center;">'+msg+'</p>'+
      '<div class="nextwrap" style="text-align:center;"><button class="btn" onclick="location.reload()">Play again</button></div>';
    if(window.ftCelebrate) window.ftCelebrate('Score: '+Math.round(score)+' ('+b.label+')');
  }
  paint(); render();
})();
</script>
</body>
</html>
