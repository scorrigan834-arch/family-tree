<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Needs &amp; Wants &mdash; Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="site.js" defer></script>
<style>
  .stage{max-width:480px;margin:0 auto;text-align:center;}
  .hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-family:var(--sans);}
  .hud .score{font-family:var(--serif);font-size:24px;color:var(--forest);}
  .hud .streak{font-weight:600;color:var(--clay);font-size:15px;min-height:20px;transition:transform .2s;}
  .hud .streak.pop{transform:scale(1.35);}
  .pbar{height:8px;background:var(--sand);border-radius:99px;overflow:hidden;margin-bottom:20px;}
  .pbar > div{height:100%;background:linear-gradient(90deg,var(--sprout),var(--moss));border-radius:99px;transition:width .4s ease;}
  .card{background:#fff;border:2px solid var(--line);border-radius:26px;padding:38px 20px;box-shadow:0 18px 40px rgba(15,42,34,.10);transition:transform .35s cubic-bezier(.34,1.3,.5,1),opacity .35s;}
  .card.in{animation:pop .4s cubic-bezier(.34,1.5,.5,1);}
  .card.right{transform:translateX(320px) rotate(16deg);opacity:0;}
  .card.left{transform:translateX(-320px) rotate(-16deg);opacity:0;}
  .card.buzz{animation:buzz .4s;}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  @keyframes buzz{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px);}40%{transform:translateX(9px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
  .emoji{font-size:78px;line-height:1;}
  .iname{font-family:var(--serif);font-size:28px;color:var(--forest);margin-top:14px;}
  .btns{display:flex;gap:14px;margin-top:22px;}
  .btns button{flex:1;font-family:var(--sans);font-weight:700;font-size:19px;padding:20px;border-radius:18px;border:none;cursor:pointer;color:#fff;box-shadow:0 6px 0 rgba(0,0,0,.15);transition:transform .1s,box-shadow .1s;}
  .btns button:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.15);}
  #bNeed{background:var(--moss);}
  #bWant{background:var(--clay);}
  .btns button:disabled{opacity:.85;}
  .fb{min-height:26px;margin-top:16px;font-weight:700;font-size:16px;}
  .fb.ok{color:var(--moss);} .fb.no{color:var(--clay);}
  .end .stars{font-size:44px;letter-spacing:6px;}
  .end h2{font-family:var(--serif);color:var(--forest);font-size:30px;margin:10px 0 4px;}
  .end p{color:var(--stone);}
</style>
</head>
<body>
<header class="topbar"><div class="bar"><a class="brand" href="index.html" style="text-decoration:none;"><svg width="24" height="24" viewBox="0 0 48 48" fill="none" style="color:var(--sprout)"><path d="M24 43C24 35 24 30 24 17" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M24 31C15 32 9.5 25.5 11 18C18.5 19 23 24.5 24 31Z" fill="currentColor"/><path d="M24 24C32.5 25 38.5 18.5 37 11C29.5 12 24.5 17.5 24 24Z" fill="currentColor"/><circle cx="24" cy="14" r="3.1" fill="currentColor"/></svg><span class="wm">Family <i>Tree</i></span></a></div></header>
<section class="section band-forest">
  <div class="inner">
    <span class="eyebrow" style="color:var(--sprout);">Play &middot; First Roots</span>
    <h1 class="display" style="font-size:clamp(30px,6vw,46px);">Needs &amp; Wants</h1>
    <p class="subhead">A <b>need</b> keeps us healthy and safe. A <b>want</b> is just nice to have. Tap the right one and build a streak!</p>
  </div>
</section>
<section class="section band-paper">
  <div class="inner">
    <div class="stage">
      <div class="hud">
        <div class="score">⭐ <span id="score">0</span></div>
        <div class="streak" id="streak"></div>
      </div>
      <div class="pbar"><div id="pbar" style="width:0"></div></div>
      <div id="board"></div>
    </div>
    <p style="text-align:center;margin-top:28px;"><a href="first-roots-needs.html">Read the lesson</a> &middot; <a href="games.html">All games</a></p>
  </div>
</section>
<script>
(function(){
  var ITEMS=[
    {e:"🍎",n:"Food",need:true},{e:"💧",n:"Clean water",need:true},{e:"🧥",n:"A warm coat",need:true},
    {e:"🏠",n:"A home",need:true},{e:"💊",n:"Medicine",need:true},{e:"🛏️",n:"A bed to sleep in",need:true},
    {e:"🍬",n:"Candy",need:false},{e:"🎮",n:"A video game",need:false},{e:"🚲",n:"A shiny new bike",need:false},
    {e:"🧸",n:"Another toy",need:false},{e:"🍦",n:"Ice cream",need:false},{e:"📺",n:"A bigger TV",need:false}
  ];
  var order=ITEMS.map(function(_,i){return i;}).sort(function(){return Math.random()-0.5;}).slice(0,10);
  var i=0, score=0, streak=0, correct=0, lock=false;
  var board=document.getElementById("board"), scoreEl=document.getElementById("score"),
      streakEl=document.getElementById("streak"), pbar=document.getElementById("pbar");
  function render(){
    lock=false;
    pbar.style.width=(i/order.length*100)+"%";
    if(i>=order.length){ return end(); }
    var it=ITEMS[order[i]];
    board.innerHTML='<div class="card in" id="card"><div class="emoji">'+it.e+'</div><div class="iname">'+it.n+'</div>'+
      '<div class="btns"><button id="bNeed">Need</button><button id="bWant">Want</button></div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById("bNeed").onclick=function(){pick(true);};
    document.getElementById("bWant").onclick=function(){pick(false);};
  }
  function pick(saidNeed){
    if(lock) return; lock=true;
    var it=ITEMS[order[i]], card=document.getElementById("card"), fb=document.getElementById("fb");
    document.getElementById("bNeed").disabled=true; document.getElementById("bWant").disabled=true;
    if(saidNeed===it.need){
      correct++; streak++; var pts=10+(streak>=3?5:0); score+=pts; scoreEl.textContent=score;
      fb.textContent="✓ Yes! +"+pts; fb.className="fb ok";
      streakEl.textContent = streak>=2 ? "🔥 "+streak+" in a row!" : "";
      streakEl.classList.add("pop"); setTimeout(function(){streakEl.classList.remove("pop");},200);
      card.classList.add(saidNeed?"left":"right");
      if(streak===4 && window.ftCelebrate) window.ftCelebrate("On fire! 4 in a row!");
      i++; setTimeout(render,420);
    } else {
      streak=0; streakEl.textContent="";
      fb.textContent = it.need ? "That one is a need — we need it to live." : "That one is a want — fun, but not needed.";
      fb.className="fb no"; card.classList.add("buzz");
      i++; setTimeout(render,1500);
    }
  }
  function end(){
    var pct=correct/order.length, fullStars=Math.round(pct*3);
    var stars=""; for(var k=0;k<3;k++){ stars+= k<fullStars?"⭐":"☆"; }
    var msg = pct>=0.9?"Amazing! You really know your needs from your wants." : pct>=0.6?"Great job! You're getting the hang of it." : "Good try! Play again to beat your score.";
    board.innerHTML='<div class="card in end"><div class="stars">'+stars+'</div><h2>'+correct+' of '+order.length+' right</h2><p>'+msg+'</p>'+
      '<div class="btns" style="margin-top:20px;"><button id="bNeed" onclick="location.reload()">Play again</button></div></div>';
    pbar.style.width="100%";
    if(window.ftCelebrate) window.ftCelebrate("Nice work: "+correct+"/"+order.length+"!");
  }
  render();
})();
</script>
</body>
</html>
