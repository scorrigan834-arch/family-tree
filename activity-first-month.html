<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Your First Month On Your Own &mdash; Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="site.js" defer></script>
<style>
  .stage{max-width:540px;margin:0 auto;}
  .money-left{text-align:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:18px;box-shadow:0 10px 28px rgba(15,42,34,.07);position:sticky;top:8px;z-index:5;}
  .money-left .lab{font-size:13px;color:var(--stone);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
  .money-left .amt{font-family:var(--serif);font-size:38px;line-height:1;margin-top:4px;transition:color .3s;}
  .cat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
  .cat .top{display:flex;justify-content:space-between;align-items:baseline;}
  .cat .name{font-weight:600;color:var(--forest);font-size:15px;}
  .cat .v{font-family:var(--serif);font-size:20px;color:var(--moss);}
  .cat input[type=range]{width:100%;margin-top:8px;accent-color:var(--moss);height:26px;}
  .go-row{text-align:center;margin-top:8px;}
  .result{background:#fff;border:2px solid var(--line);border-radius:20px;padding:24px;margin-top:18px;text-align:center;box-shadow:0 16px 38px rgba(15,42,34,.10);display:none;}
  .result.show{display:block;animation:pop .4s cubic-bezier(.34,1.5,.5,1);}
  @keyframes pop{0%{transform:scale(.85);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .result .stars{font-size:38px;letter-spacing:5px;}
  .result h2{font-family:var(--serif);color:var(--forest);font-size:24px;margin:8px 0 6px;}
  .result p{color:var(--stone);margin:0;font-size:14.5px;line-height:1.5;}
</style>
</head>
<body>
<header class="topbar"><div class="bar"><a class="brand" href="index.html" style="text-decoration:none;"><svg width="24" height="24" viewBox="0 0 48 48" fill="none" style="color:var(--sprout)"><path d="M24 43C24 35 24 30 24 17" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M24 31C15 32 9.5 25.5 11 18C18.5 19 23 24.5 24 31Z" fill="currentColor"/><path d="M24 24C32.5 25 38.5 18.5 37 11C29.5 12 24.5 17.5 24 24Z" fill="currentColor"/><circle cx="24" cy="14" r="3.1" fill="currentColor"/></svg><span class="wm">Family <i>Tree</i></span></a></div></header>
<section class="section band-forest">
  <div class="inner">
    <span class="eyebrow" style="color:var(--sprout);">Play &middot; Taking Root</span>
    <h1 class="display" style="font-size:clamp(30px,6vw,46px);">Your first month on your own</h1>
    <p class="subhead">Your take-home pay is <b>$2,800</b>. Slide to build a real monthly budget &mdash; cover the essentials, and try to save. Can you make it balance?</p>
  </div>
</section>
<section class="section band-paper">
  <div class="inner">
    <div class="stage">
      <div class="money-left"><div class="lab">Left to budget</div><div class="amt" id="left">$2,800</div></div>
      <div id="cats"></div>
      <div class="go-row"><button class="btn btn-lg" id="check">Check my budget</button></div>
      <div class="result" id="result"></div>
    </div>
    <p style="text-align:center;margin-top:28px;"><a href="taking-budget.html">Read the lesson</a> &middot; <a href="games.html">All games</a></p>
  </div>
</section>
<script>
(function(){
  var INCOME=2800;
  var CATS=[
    {k:'rent', name:'Rent', min:600, max:1500, step:50, val:1000},
    {k:'food', name:'Groceries', min:100, max:600, step:25, val:300},
    {k:'trans', name:'Transport', min:0, max:400, step:25, val:150},
    {k:'phone', name:'Phone & internet', min:40, max:160, step:10, val:90},
    {k:'fun', name:'Fun & extras', min:0, max:700, step:25, val:250},
    {k:'save', name:'Savings', min:0, max:900, step:25, val:200}
  ];
  var catsEl=document.getElementById('cats'), leftEl=document.getElementById('left'), resultEl=document.getElementById('result');
  function money(n){ return '$'+Math.round(n).toLocaleString(); }
  catsEl.innerHTML=CATS.map(function(c){
    return '<div class="cat"><div class="top"><span class="name">'+c.name+'</span><span class="v" id="v-'+c.k+'">'+money(c.val)+'</span></div>'+
      '<input type="range" id="s-'+c.k+'" min="'+c.min+'" max="'+c.max+'" step="'+c.step+'" value="'+c.val+'"></div>';
  }).join('');
  function total(){ var t=0; CATS.forEach(function(c){ t+=+document.getElementById('s-'+c.k).value; }); return t; }
  function update(){
    var left=INCOME-total();
    leftEl.textContent=money(left);
    leftEl.style.color = left<0 ? '#C0553B' : (left===0 ? '#2F7D53' : 'var(--forest)');
    CATS.forEach(function(c){ document.getElementById('v-'+c.k).textContent=money(+document.getElementById('s-'+c.k).value); });
  }
  CATS.forEach(function(c){ document.getElementById('s-'+c.k).addEventListener('input', function(){ update(); resultEl.classList.remove('show'); }); });
  document.getElementById('check').onclick=function(){
    var vals={}; CATS.forEach(function(c){ vals[c.k]=+document.getElementById('s-'+c.k).value; });
    var left=INCOME-total(), save=vals.save, stars, title, msg;
    if(left<0){ stars=0; title='Over budget by '+money(-left); msg='You&rsquo;re spending more than you earn. Trim something &mdash; usually rent or fun &mdash; until you&rsquo;re back to $0 or above.'; }
    else if(vals.rent<600 || vals.food<150){ stars=1; title='Essentials look thin'; msg='Make sure rent and groceries are realistic first &mdash; those come before fun.'; }
    else if(save>=INCOME*0.15 && left>=0){ stars=3; title='Nailed it!'; msg='Essentials covered, and you saved '+money(save)+' &mdash; over 15% of your pay. That&rsquo;s a pro-level first month.'; }
    else if(save>=INCOME*0.10){ stars=2; title='Solid budget'; msg='You covered your needs and saved '+money(save)+'. Nudge savings a little higher and you&rsquo;re golden.'; }
    else { stars=1; title='It balances &mdash; but save more'; msg='Your budget works, but savings are low. Even $280 (10%) builds a real safety net over time.'; }
    var s=''; for(var i=0;i<3;i++){ s+= i<stars?'\u2b50':'\u2606'; }
    resultEl.innerHTML='<div class="stars">'+s+'</div><h2>'+title+'</h2><p>'+msg+'</p>';
    resultEl.classList.add('show');
    if(stars>=2 && window.ftCelebrate) window.ftCelebrate(stars===3?'Budget master!':'Nice budgeting!');
  };
  update();
})();
</script>
</body>
</html>
